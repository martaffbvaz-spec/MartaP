
<!DOCTYPE html> 
<html lang="pt-pt"> 

<head> 

    <title>portfolio test</title>
    

    <meta charset="UTF-8"> 

    <link rel="stylesheet" href="estilos.css"> 

    <!-- FONTE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(to bottom, #f5f1eb, #e8ddd0);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.5px;

            animation: fadeIn 1.2s ease;
        }

        .container {
            position: relative;

            max-width: 1200px;
            width: 90%;

            margin: auto;

            z-index: 10;

            display: flex;
            justify-content: center;
            align-items: center;

            background: rgba(255,255,255,0.25);

            backdrop-filter: blur(12px);

            border-radius: 30px;

            padding: 40px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.08);
        }

        .imagem-fundo {
            width: 1000px;
            height: 700px;

            display: block;

            border-radius: 30px;

            object-fit: cover;

            opacity: 0.95;
        }

        h1 {

            font-family: "Helvetica Neue", Arial, sans-serif;

            font-weight: 700;

            font-size: 72px;

            text-align: center;

            color: #111;

            margin-top: 40px;

            margin-bottom: 10px;

            letter-spacing: -3px;

            transition: 0.4s ease;
        }

        h1:hover {
            color: #555;
        }

        .subtitulo {

            text-align: center;

            font-size: 18px;

            color: #555;

            margin-bottom: 50px;

            letter-spacing: 2px;
        }

        .intro {

            text-align: center;

            max-width: 700px;

            margin: auto;

            margin-bottom: 60px;
        }

        .intro p {

            font-size: 20px;

            line-height: 1.6;

            color: #444;
        }

        /* PASTAS */

        .pasta-container {

            position: absolute;

            text-align: center;

            width: 200px;
        }

        .pasta-container img {

            width: 180px;

            height: 180px;

            transition: all 0.4s ease;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.12);

            border-radius: 20px;
        }

        .pasta-container:hover img {

            transform: translateY(-10px) scale(1.04);
        }

        .pasta-container p {

            margin-top: 10px;

            font-weight: 600;

            font-size: 15px;

            color: black;

            letter-spacing: 2px;

            text-transform: uppercase;

            transition: 0.3s ease;
        }

        .pasta-container:hover p {

            color: #000;

            transform: translateY(5px);
        }

        /* PASTAS DENTRO DO "PC" */

        .pasta1 { 
            left: 180px; 
            top: 180px;
        }

        .pasta2 { 
            left: 410px; 
            top: 180px;
        }

        .pasta3 { 
            left: 640px; 
            top: 180px;
        }

        /* PASTA 4 EM BAIXO */

        .pasta4 { 
            left: 870px; 
            top: 180px 
        }

        /* ANIMAÇÃO */

        @keyframes rodar {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .fruit {

            position: absolute;

            left: 1010px;

            top: -50px;

            width: 200px;

            animation: rodar 18s linear infinite;

            opacity: 0.7;
        }

        .cursor-loading {

            position: absolute;

            left: 420px;

            top: 310px;

            width: 60px;

            pointer-events: none;
        }

        .barra-ferramentas {

            position: absolute;

            left: -200px;

            top: 150px;

            width: 300px;

            opacity: 0.9;
        }

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(20px);
            }

            to {

                opacity: 1;

                transform: translateY(0);
            }
        }

    </style>

</head>

<body>

    <h1>Portfólio Marta Vaz</h1> 

    <p class="subtitulo">
        Creative Developer & Multimedia Designer
    </p>

    <div class="intro">

        <p>
            Designer multimédia focada em fotografia,
            vídeo e experiências digitais.
        </p>

    </div>

    <div class="container">

        <img src="imagens/imagemfundo.jpg" class="imagem-fundo">

        <!-- FOTOGRAFIA -->

        <div class="pasta-container pasta1">

            <a href="fotografia.html">
                <img src="imagens/pasta.png">
            </a>

            <p>FOTOGRAFIA</p>

        </div>

        <!-- MULTIMEDIA -->

        <div class="pasta-container pasta2">

            <a href="Multimedia.html">
                <img src="imagens/pasta.png">
            </a>

            <p>VÍDEO & MEDIA</p>

        </div>

        <!-- SOBRE MIM -->

        <div class="pasta-container pasta3">

            <a href="contact.html">
                <img src="imagens/pasta.png">
            </a>

            <p>SOBRE MIM</p>

        </div>

        <!-- TRABALHOS -->

        <div class="pasta-container pasta4">

            <a href="Trabalho.html">
                <img src="imagens/pasta.png">
            </a>

            <p>TRABALHOS</p>

        </div>

        <!-- ELEMENTOS VISUAIS -->

        <img src="imagens/p1.png" class="barra-ferramentas">

        <img src="imagens/Untitled-2.png" class="fruit">

        <!-- CURSOR GIF -->

        <img src="imagens/cursorhand.gif" class="cursor-loading">

    </div>

</body>

</html>
